# pipeline parameters
fullpipeline: false
maponly: false
cageronly: true

# preprocessing parameters
samplesheet:
infolder:
sample_name_fields:
bsgenome: "BSgenome.Hsapiens.UCSC.hg38"
forgeseed:
sourcedir:
fasta:
index:
gtf: "/storage/mathelierarea/raw/GENCODE/Gencode_human/release_46/gencode.v46.primary_assembly.annotation.gtf"
star_ignore_sjdbgtf: false
seq_platform: "illumina"
seq_center: false
# whether to take the uniquely mapped only
unique_only: true

# CAGEr parameters
cager_sample_file: "/storage/scratch2/TCGA/BRCAGE/sample_list.csv" # with sorted list of bigwigs, if mapping is run elsewhere
tpm_threshold: 1
# parameters for normalization
norm_range_min: 10
norm_range_max: 10000
norm_method: "powerLaw"
total_tag_num: 1000000
# parameters for CTSS
sample_num_thr: 1
ctss_thr: 1
# markdown location
markdown_path: "assets/cager_report.Rmd"
