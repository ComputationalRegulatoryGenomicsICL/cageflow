# pipeline parameters
fullpipeline: true
maponly: false
cageronly: false
gtf: "customcageq/assets/sacCer3_genome/sacCer3.ensGene.gtf"

# preprocessing parameters
samplesheet: "customcageq/assets/samplesheet_sacer_pe_template_for_GA.csv"
infolder:
sample_name_fields:
genome_name: "sacCer3"
fasta: "customcageq/assets/sacCer3_genome/sacCer3.fa"
index: "customcageq/assets/sacCer3_genome/sacCer3_star_index/"
star_ignore_sjdbgtf: false
seq_platform: "illumina"
seq_center: false
# whether to take the uniquely mapped only (for STAR)
unique_only: false

# CAGEr parameters
cager_sample_file:
# BSgenome
forgeseed:
sourcedir:
bsgenome: "BSgenome.Scerevisiae.UCSC.sacCer3"
# tagcluster qc
tpm_threshold: 1
# parameters for normalization
norm_range_min: 5
norm_range_max: 10000
norm_method: "powerLaw"
T_norm: 1000000
# parameters for CTSS
sample_num_thr: 1
ctss_thr: 1
# parameters for consensus clusters
consensus_ctss_thr: 2
consensus_ctss_dist: 100
pca_rank: 50
