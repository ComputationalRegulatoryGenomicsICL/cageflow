# pipeline parameters
fullpipeline: true
maponly: false
cageronly: false
gtf: "/storage/mathelierarea/raw/GENCODE/Gencode_human/release_46/gencode.v46.primary_assembly.annotation.gtf"

# preprocessing parameters
samplesheet: "/storage/mathelierarea/processed/katalitf/CAGEscan/cagescan_sample_sheet_subsampled_celllines_2.csv"
infolder:
sample_name_fields:
genome_name: "GRCh38"
fasta: "/storage/mathelierarea/raw/GENCODE/Gencode_human/release_46/GRCh38.primary_assembly.genome.fa"
index: "/storage/mathelierarea/raw/GENCODE/Gencode_human/release_46/star_index/star_genomegenerate/star"
seq_platform: "illumina"
seq_center: false
# whether to take the uniquely mapped only
unique_only: true
# whether to remove reads that do not start with G
remove_non_g: false
# additional parameters for trimgalore
params_trimgalore: "--clip_R1 9 --clip_R2 6 --trim-n"

# CAGEr parameters
cager_sample_file:
# BSgenome
forgeseed:
sourcedir:
bsgenome: "BSgenome.Hsapiens.UCSC.hg38"
# parameter for correlation calculation
corrplot_tagCountThreshold: 1
# correlation plotting of samples
heatmap_cex: 1
# parameters for normalization
norm_range_min: 5
norm_range_max: 10000
norm_method: "powerLaw"
alpha:
T_norm: 1000000
# parameters for tag clustering
sample_num_thr: 1
ctss_thr: 1
distclu_maxDist: 20
keepSingletonsAbove: 5
iq_low: 0.1
iq_high: 0.9
# plotting for tagclusters QC
iqw_tpm_threshold: 3
tssregion_up: -3000
tssregion_down: 3000
tsslogo_upstream: 35
# parameters for consensus clusters
consensus_thr: 2
consensus_dist: 100
# parameters for enhancer calling
cfBalanceThreshold: 0.95
unexpressed: 0
minSamples: 0
