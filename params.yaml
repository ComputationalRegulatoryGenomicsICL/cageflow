# pipeline parameters
fullpipeline: true
maponly: false
cageronly: false
gtf: "assets/sacCer3_genome/sacCer3.ensGene.gtf"

# preprocessing parameters
samplesheet: "assets/samplesheet_sacer_pe_template_for_GA.csv"
infolder:
sample_name_fields:
genome_name: "sacCer3"
fasta: "assets/sacCer3_genome/sacCer3.fa"
index: "assets/sacCer3_genome/sacCer3_star_index/"
star_ignore_sjdbgtf: false
seq_platform: "illumina"
seq_center: false
# whether to take the uniquely mapped only
unique_only: false

# CAGEr parameters
cager_sample_file: "assets/sample_list.csv" # with sorted list of bigwigs, if mapping is run elsewhere
# BSgenome
forgeseed:
sourcedir:
bsgenome: "BSgenome.Scerevisiae.UCSC.sacCer3"
# tagcluster qc
tpm_threshold: 1
# parameters for normalization
norm_range_min: 10
norm_range_max: 10000
norm_method: "powerLaw"
total_tag_num: 1000000
# parameters for CTSS
sample_num_thr: 1
ctss_thr: 1
# markdown location
markdown_path: "assets/cager_report.Rmd"
