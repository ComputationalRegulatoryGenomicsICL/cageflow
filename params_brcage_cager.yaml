# pipeline parameters
fullpipeline: false
maponly: false
cageronly: true
gtf: "/storage/mathelierarea/raw/GENCODE/Gencode_human/release_46/gencode.v46.primary_assembly.annotation.gtf"

# preprocessing parameters
samplesheet:
infolder:
sample_name_fields:
genome_name: "hg38"
fasta:
index:
star_ignore_sjdbgtf: false
seq_platform: "illumina"
seq_center: false
# whether to take the uniquely mapped only
unique_only: true

# CAGEr parameters
cager_sample_file: "/storage/scratch2/TCGA/BRCAGE/sample_list_wo_lowquality.csv" # with sorted list of bigwigs, if mapping is run elsewhere
# BSgenome
forgeseed:
sourcedir:
bsgenome: "BSgenome.Hsapiens.UCSC.hg38"
# parameter for correlation calculation
corrplot_tagCountThreshold: 1
# correlation plotting of 10+ samples
heatmap_cex_row: 0.2
# parameters for normalization
norm_range_min: 5
norm_range_max: 10000
norm_method: "powerLaw"
alpha:
T_norm: 1000000
# parameters for tag clustering
sample_num_thr: 1
ctss_thr: 1
distclu_maxDist: 20
keepSingletonsAbove: 5
iq_low: 0.1
iq_high: 0.9
# plotting for tagclusters QC
iqw_tpm_threshold: 3
tssregion_up: -3000
tssregion_down: 3000
tsslogo_upstream: 35
# parameters for consensus clusters
consensus_ctss_thr: 2
consensus_ctss_dist: 100
pca_rank: 50
