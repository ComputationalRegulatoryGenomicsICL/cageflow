name: "samtools_dedup"
description: simplified version of samtools markdup that mark duplicate alignments in a bam file
keywords:
  - bam
  - duplicates
  - markduplicates
  - samtools
tools:
  - "samtools":
      description: "Tools for dealing with SAM, BAM and CRAM files"
      homepage: "http://www.htslib.org"
      documentation: "https://www.htslib.org/doc/samtools-markdup.html"
      tool_dev_url: "https://github.com/samtools/samtools"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT"]
      identifier: biotools:samtools
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - input:
      type: file
      description: BAM file
      pattern: "*{.bam}"
      ontologies: []
output:
  bam:
    - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - "*.bam":
        type: file
        description: BAM file
        pattern: "*{.bam}"
        ontologies: []
  txt:
    - "*_dedup_stats.txt":
        type: file
        description: Samtools deduplication statistics file
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@priyanka-surana"
  - "@sidorov-si"
  - "@ferenckata"
maintainers:
  - "@priyanka-surana"
  - "@sidorov-si"
  - "@ferenckata"
